<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient (ANWB Blue) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0052A3"/>
      <stop offset="100%" stop-color="#002D5E"/>
    </linearGradient>
    
    <!-- Sun & Electricity Gradient -->
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#FF9900"/>
    </linearGradient>
    
    <!-- Graph Gradient -->
    <linearGradient id="graph" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#69F0AE"/>
    </linearGradient>

    <!-- Unified Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- App Icon Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Sun with fat rays (placed in the background, top left) -->
  <g filter="url(#shadow)">
    <circle cx="120" cy="130" r="45" fill="url(#sun)"/>
    <path d="M 120 45 L 120 70 M 120 190 L 120 215 M 35 130 L 60 130 M 180 130 L 205 130 M 60 70 L 78 88 M 162 172 L 180 190 M 60 190 L 78 172 M 180 70 L 162 88" fill="none" stroke="url(#sun)" stroke-width="18" stroke-linecap="round"/>
  </g>

  <!-- House -->
  <path d="M 256 130 L 70 300 L 110 300 L 110 470 L 402 470 L 402 300 L 442 300 Z" fill="#ffffff" filter="url(#shadow)"/>

  <!-- Closed Door (Outline) -->
  <path d="M 216 470 L 216 350 L 296 350 L 296 470" fill="none" stroke="#0052A3" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="278" cy="410" r="6" fill="#0052A3"/>

  <!-- Electricity (Lightning Bolt inside the house) -->
  <path d="M 271 180 L 221 260 L 256 260 L 236 330 L 296 240 L 261 240 Z" fill="url(#sun)"/>

  <!-- Graphs (Upward trend on bottom) -->
  <path d="M 60 400 L 180 280 L 280 330 L 420 250" fill="none" stroke="url(#graph)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>
  
  <!-- Money (Euro Coin at the end of the graph) -->
  <circle cx="420" cy="250" r="32" fill="url(#sun)" filter="url(#shadow)"/>
  <path d="M 428 242 A 12 12 0 1 0 428 258 M 404 246 L 424 246 M 404 254 L 424 254" fill="none" stroke="#002D5E" stroke-width="4.5" stroke-linecap="round"/>
</svg>